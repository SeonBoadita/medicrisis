<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mediCrisis — Surgeon Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { doto: ['Doto'], inter: ['Inter'] } } } }</script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none !important
    }

    body {
      background: #fff;
      color: #000;
      font-family: 'Inter', sans-serif;
      min-height: 100vh
    }

    #vr-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 32px;
      height: 32px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference
    }

    #vr-cursor .cx {
      position: absolute;
      top: 50%;
      left: -10px;
      right: -10px;
      height: 1px;
      background: rgba(255, 255, 255, .8);
      transform: translateY(-50%)
    }

    #vr-cursor .cy {
      position: absolute;
      left: 50%;
      top: -10px;
      bottom: -10px;
      width: 1px;
      background: rgba(255, 255, 255, .8);
      transform: translateX(-50%)
    }

    #vr-cursor .cb {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, .4);
      border-radius: 4px
    }

    #grid-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%
    }

    .navbar {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 95%;
      max-width: 1400px;
      padding: 1rem 2.5rem;
      border-radius: 100px;
      background: rgba(255, 255, 255, .001);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, .6);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, .05)
    }

    .glass {
      background: rgba(255, 255, 255, .6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, .06)
    }

    .tier {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase
    }

    .tier-student {
      background: rgba(107, 114, 128, .12);
      color: #6b7280;
      border: 1px solid rgba(107, 114, 128, .25)
    }

    .tier-resident {
      background: rgba(59, 130, 246, .1);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, .25)
    }

    .tier-attending {
      background: rgba(16, 185, 129, .1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, .25)
    }

    .tier-chief {
      background: rgba(245, 158, 11, .1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, .3)
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      animation: pulse 2s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(0, 0, 0, .2)
      }

      50% {
        box-shadow: 0 0 0 8px rgba(0, 0, 0, 0)
      }
    }

    .ai-text p {
      margin-bottom: 1rem;
      line-height: 1.75
    }
  </style>
</head>

<body class="overflow-x-hidden">
  <canvas id="grid-canvas"></canvas>
  <div id="vr-cursor">
    <div class="cx"></div>
    <div class="cy"></div>
    <div class="cb"></div>
  </div>

  <nav class="navbar flex items-center justify-between" id="navbar">
    <a href="leaderboard.html" class="flex items-center gap-3">
      <img src="assets/logo/mainLogo.svg" class="w-10 h-10 object-contain" style="filter:brightness(0)">
      <span class="font-doto text-2xl font-bold tracking-wider text-black">medi<span
          class="font-black">Crisis</span></span>
    </a>
    <div class="flex items-center gap-3">
      <a href="leaderboard.html"
        class="px-4 py-2 text-xs font-bold uppercase tracking-widest text-black/50 hover:text-black transition-colors"><i
          class="fa-solid fa-arrow-left mr-1"></i>Back</a>
      <div class="flex items-center gap-2 bg-black/5 rounded-full px-3 py-2 border border-black/10">
        <div class="pulse-dot"></div>
        <span class="text-xs font-bold text-black tracking-wide">PROFILE</span>
      </div>
    </div>
  </nav>

  <main class="relative z-10 max-w-4xl mx-auto px-4 pt-32 pb-12">
    <!-- Header -->
    <div class="glass rounded-3xl p-8 mb-6 border border-black/8 shadow-lg" id="profileHeader">
      <div class="flex items-center gap-6 flex-wrap">
        <div
          class="w-20 h-20 rounded-full bg-black/5 border-2 border-black/10 flex items-center justify-center text-3xl flex-shrink-0">
          <i class="fa-solid fa-user-doctor text-black/40"></i></div>
        <div>
          <p class="text-xs text-black/40 font-bold uppercase tracking-widest mb-1">Surgeon Profile</p>
          <h1 class="font-black text-3xl text-black mb-2" id="profileName">Loading…</h1>
          <div class="flex items-center gap-3 flex-wrap">
            <span class="text-xs text-black/40" id="profileSessions"></span>
          </div>
        </div>
        <div class="ml-auto grid grid-cols-2 gap-4">
          <div class="text-center">
            <p class="font-doto text-3xl font-black text-black" id="profileAvg">—</p>
            <p class="text-[0.6rem] text-black/40 uppercase tracking-widest">Avg Score</p>
          </div>
          <div class="text-center">
            <p class="font-doto text-3xl font-black text-black" id="profileBest">—</p>
            <p class="text-[0.6rem] text-black/40 uppercase tracking-widest">Best Score</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Trend Chart -->
    <div class="glass rounded-3xl p-6 mb-6 border border-black/8 shadow-lg">
      <h2 class="text-xs font-bold text-black/50 uppercase tracking-widest mb-4"><i
          class="fa-solid fa-chart-line mr-2"></i>Health Score — Career Trend</h2>
      <div style="height:200px;position:relative"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- Session History -->
    <div class="glass rounded-3xl p-6 mb-6 border border-black/8 shadow-lg">
      <h2 class="text-xs font-bold text-black/50 uppercase tracking-widest mb-4"><i
          class="fa-solid fa-clock-rotate-left mr-2"></i>Session History</h2>
      <div id="sessionList" class="flex flex-col gap-2"></div>
    </div>

    <!-- AI Analysis -->
    <div class="glass rounded-3xl p-6 border border-black/8 shadow-lg" id="aiPanel">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-bold text-black/50 uppercase tracking-widest"><i class="fa-solid fa-robot mr-2"></i>AI
          Career Analysis</h2>
        <button onclick="generateAnalysis()" id="analyzeBtn"
          class="px-5 py-2 bg-black text-white text-xs font-bold uppercase tracking-widest rounded-full hover:bg-black/80 transition-colors flex items-center gap-2">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
        </button>
      </div>
      <div id="aiAnalysis" class="text-sm text-black/70 leading-relaxed ai-text">
        <p class="text-black/30 italic">Click Generate to receive a personalized AI career trajectory analysis powered
          by Gemini.</p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const surgeon = params.get('name') || 'Unknown';
    let sessions = [];

    // VR Cursor
    const cur = document.getElementById('vr-cursor'); let cx = 0, cy = 0;
    addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY });
    gsap.ticker.add(() => gsap.set(cur, { x: cx, y: cy }));

    function getTier(s) { if (s >= 85) return { cls: 'tier-chief', label: '<i class="fa-solid fa-user-doctor mr-1"></i> Chief Surgeon' }; if (s >= 65) return { cls: 'tier-attending', label: '<i class="fa-solid fa-stethoscope mr-1"></i> Attending' }; if (s >= 40) return { cls: 'tier-resident', label: '<i class="fa-solid fa-pills mr-1"></i> Resident' }; return { cls: 'tier-student', label: '<i class="fa-solid fa-book-open mr-1"></i> Med Student' }; }

    let trendChart;
    function initTrendChart(data) {
      const ctx = document.getElementById('trendChart').getContext('2d');
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map((_, i) => '#' + (i + 1)),
          datasets: [{
            label: 'Health',
            data: data.map(d => {
              let score = parseInt(d.integrity_score) || 0;
              const status = (d.surgery_status || '').toLowerCase();
              if (status === 'failed' || status === 'stopped' || status === 'abandoned' || status !== 'completed') {
                score = 0;
              }
              return score;
            }),
            borderColor: '#000',
            backgroundColor: 'rgba(0,0,0,0.06)',
            tension: .4,
            fill: true,
            pointRadius: 5,
            pointBackgroundColor: data.map(d => {
              let score = parseInt(d.integrity_score) || 0;
              const status = (d.surgery_status || '').toLowerCase();
              if (status === 'failed' || status === 'stopped' || status === 'abandoned' || status !== 'completed') {
                score = 0;
              }
              return score >= 80 ? '#000' : '#ff3b5c';
            })
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,0.04)' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
      });
    }

    function buildSessionRow(s, i) {
      const score = parseInt(s.integrity_score) || 0;
      const color = score >= 80 ? '#000' : score >= 50 ? '#666' : '#ff3b5c';
      const st = (s.surgery_status || '').toLowerCase();
      let badge = '';
      if (st === 'completed') {
        badge = `<span class="text-[0.6rem] font-bold text-green-600 bg-green-50 border border-green-200 rounded-full px-2 py-0.5"><i class="fa-solid fa-check mr-1"></i>Success</span>`;
      } else if (st === 'stopped' || st === 'failed') {
        badge = `<span class="text-[0.6rem] font-bold text-red-500 bg-red-50 border border-red-200 rounded-full px-2 py-0.5"><i class="fa-solid fa-xmark mr-1"></i>Failed</span>`;
      } else {
        badge = `<span class="text-[0.6rem] font-bold text-gray-500 bg-gray-100 border border-gray-200 rounded-full px-2 py-0.5"><i class="fa-solid fa-minus mr-1"></i>Abandoned</span>`;
      }
      const mins = Math.floor((s.duration_seconds || 0) / 60), secs = (s.duration_seconds || 0) % 60;
      return `<div class="flex items-center gap-3 p-3 rounded-xl border border-black/5 bg-white/50">
        <span class="font-doto text-xs font-black text-black/30 w-6">#${i + 1}</span>
        <div style="font-family:'Doto',monospace;font-size:1.4rem;font-weight:900;color:${color};min-width:48px">${score}<span style="font-size:.7rem;font-weight:400;color:rgba(0,0,0,.3)">%</span></div>
        <div class="flex-1"><span class="text-xs text-black/50">${mins}m ${String(secs).padStart(2, '0')}s</span></div>
        ${badge}
        <span class="text-[0.6rem] text-black/30">${s.phase_failed ? 'Failed @ ' + s.phase_failed : ''}</span>
      </div>`;
    }

    async function loadProfile() {
      document.getElementById('profileName').textContent = surgeon;
      try {
        const res = await fetch(`http://localhost:3000/api/surgeon/${encodeURIComponent(surgeon)}/history`);
        if (!res.ok) throw new Error();
        sessions = await res.json();
        if (!sessions.length) { document.getElementById('profileSessions').textContent = 'No sessions found'; return; }

        const scores = sessions.map(s => parseInt(s.integrity_score) || 0);
        const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        const best = Math.max(...scores);

        document.getElementById('profileSessions').textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''} recorded`;
        document.getElementById('profileAvg').textContent = avg + '%';
        document.getElementById('profileBest').textContent = best + '%';
        document.getElementById('sessionList').innerHTML = sessions.map((s, i) => buildSessionRow(s, i)).join('');
        initTrendChart(sessions);

        gsap.from('#profileHeader', { y: 30, opacity: 0, duration: .6, ease: 'power3.out' });
      } catch (e) { document.getElementById('profileSessions').textContent = 'Could not load sessions (server offline?)'; }
    }

    async function generateAnalysis() {
      if (!sessions.length) { alert('No session data to analyse.'); return; }
      const btn = document.getElementById('analyzeBtn');
      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Analysing…';
      btn.disabled = true;
      document.getElementById('aiAnalysis').innerHTML = '<p class="text-black/30 italic">Gemini is reviewing your career data…</p>';
      try {
        const res = await fetch('http://localhost:3000/api/trend-analysis', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ player_name: surgeon, sessions }) });
        if (!res.ok) throw new Error();
        const { analysis } = await res.json();
        const html = analysis.split('\n\n').map(p => `<p>${p}</p>`).join('');
        document.getElementById('aiAnalysis').innerHTML = html;
        gsap.from('#aiAnalysis p', { y: 10, opacity: 0, duration: .4, stagger: .15, ease: 'power2.out' });
      } catch (e) { document.getElementById('aiAnalysis').innerHTML = '<p class="text-red-400">AI analysis failed. Is the server running?</p>'; }
      finally { btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Regenerate'; btn.disabled = false; }
    }

    document.addEventListener('DOMContentLoaded', () => {
      gsap.from('#navbar', { y: -30, opacity: 0, duration: .6, ease: 'power3.out' });
      loadProfile();
    });
  </script>

  <script type="module">
    import * as THREE from 'three';
    const gridVS = `varying vec2 vUv; void main(){vUv=uv;gl_Position=vec4(position,1.0);}`;
    const gridFS = `uniform float uTime; uniform vec2 uMouse,uResolution; varying vec2 vUv;
void main(){float a=uResolution.x/uResolution.y,gs=35.0;vec2 uv=vec2(vUv.x*a,vUv.y)*gs;vec2 mg=vec2((uMouse.x*.5+.5)*a,uMouse.y*.5+.5)*gs;vec2 cid=floor(uv),cc=cid+.5;float dm=distance(cc,mg);float wave=sin(dm*1.2-uTime*3.)*.06*smoothstep(12.,0.,dm);float push=smoothstep(8.,0.,dm);vec2 pd=normalize(cc-mg+.001);vec2 cl=fract(uv)-pd*push*.18-pd*wave;float hs=(.85-push*.2)*.5,bw=.025;vec2 fc=abs(cl-.5);float o=step(fc.x,hs)*step(fc.y,hs)-step(fc.x,hs-bw)*step(fc.y,hs-bw);vec3 bg=vec3(1.);vec3 ln=mix(vec3(0.82),vec3(0.55),push);float la=0.5+push*.5;gl_FragColor=vec4(mix(bg,ln,o*la),1.);}`;
    const canvas = document.getElementById('grid-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
    renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio, 1));
    const scene = new THREE.Scene(), camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1), mouse = new THREE.Vector2();
    const mat = new THREE.ShaderMaterial({ vertexShader: gridVS, fragmentShader: gridFS, uniforms: { uTime: { value: 0 }, uMouse: { value: new THREE.Vector2() }, uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) } }, depthWrite: false, depthTest: false });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat); mesh.frustumCulled = false; scene.add(mesh);
    const clock = new THREE.Clock();
    addEventListener('mousemove', e => { mouse.x = (e.clientX / innerWidth) * 2 - 1; mouse.y = -(e.clientY / innerHeight) * 2 + 1; });
    addEventListener('resize', () => { renderer.setSize(innerWidth, innerHeight); mat.uniforms.uResolution.value.set(innerWidth, innerHeight); });
    (function animate() { requestAnimationFrame(animate); mat.uniforms.uTime.value = clock.getElapsedTime(); mat.uniforms.uMouse.value.copy(mouse); renderer.render(scene, camera); })();
  </script>
</body>

</html>
